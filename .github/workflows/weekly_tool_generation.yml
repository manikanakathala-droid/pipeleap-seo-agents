name: Weekly Tool Page Generation

on:
  schedule:
    - cron: "0 6 * * MON"
  workflow_dispatch:
    inputs:
      batch_size:
        description: Number of tool pages to generate
        required: true
        default: "20"
        type: number

env:
  LAUNCHPAD_DEPLOY_TOKEN: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN }}
  PIPELEAP_LAUNCHPAD_DIR: pipeleap-launchpad

concurrency:
  group: pipeleap-launchpad-publish
  cancel-in-progress: false

jobs:
  generate-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout launchpad publish target
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          path: pipeleap-launchpad

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate, publish, and update glossary
        id: generate
        env:
          TOOLS_BATCH_SIZE: ${{ inputs.batch_size || '20' }}
        run: |
          # Set batch size via config override (growth engine reads from config)
          python -c "
          import yaml
          cfg = yaml.safe_load(open('config.yaml'))
          cfg.setdefault('growth_engine', {})['tools_pages_per_run'] = ${{ inputs.batch_size || 20 }}
          with open('config.yaml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          "
          python run_growth_engine.py --tools-only
          echo "Tool page generation and glossary update complete"

      - name: Validate TypeScript compilation before commit
        run: |
          cd pipeleap-launchpad
          if ! npx tsc --noEmit 2>&1; then
            echo "TypeScript validation failed — aborting commit."
            exit 1
          fi

      - name: Commit glossary updates to launchpad
        run: |
          cd pipeleap-launchpad
          git config user.name "pipeleap-seo-bot"
          git config user.email "seo-bot@pipeleap.com"
          git add src/data/glossary-terms.ts 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No glossary changes to commit."
          else
            git commit -m "Weekly glossary update #${{ github.run_number }}"
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push origin main; then
                exit 0
              fi
              git rebase --abort || true
              sleep $((attempt * 10))
            done
            echo "Unable to push glossary changes after 3 attempts." >&2
            exit 1
          fi

      - name: Sync generated content to launchpad
        run: |
          cd pipeleap-launchpad
          git config user.name "pipeleap-seo-bot"
          git config user.email "seo-bot@pipeleap.com"
          # Copy research output from CMS publish dir to launchpad seo dir
          git add -f src/data/tools/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No generated content to sync."
          else
            git commit -m "Weekly growth engine content sync #${{ github.run_number }}"
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push origin main; then
                exit 0
              fi
              git rebase --abort || true
              sleep $((attempt * 10))
            done
            echo "Unable to push content changes after 3 attempts." >&2
            exit 1
          fi

      - name: Submit sitemap to Bing Webmaster API
        run: |
          python -c "
          import os, json, urllib.request, urllib.error
          api_key = os.environ.get('BING_API_KEY', '')
          if not api_key:
              print('No BING_API_KEY set — skipping Bing sitemap submission')
              exit(0)
          payload = json.dumps({
              'siteUrl': 'https://www.pipeleap.com',
              'feedpath': 'https://www.pipeleap.com/sitemap.xml'
          }).encode('utf-8')
          endpoint = f'https://ssl.bing.com/webmaster/api.svc/json/SubmitSitemap?apikey={api_key}'
          try:
              req = urllib.request.Request(endpoint, data=payload, headers={'Content-Type': 'application/json'})
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
                  print(f'Bing sitemap submission: {result}')
          except urllib.error.HTTPError as e:
              print(f'Bing sitemap submission failed (non-fatal): HTTP {e.code} {e.reason}')
          except Exception as e:
              print(f'Bing sitemap submission failed (non-fatal): {e}')
          "
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}

      - name: Trigger Vercel deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Upload generation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tool-generation-outputs
          path: outputs/
          retention-days: 14

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Weekly Tool Generation #${{ github.run_number }} — ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: SEO Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Weekly tool page generation completed.

            Status: ${{ job.status }}
            Run: #${{ github.run_number }}
            Batch size: ${{ inputs.batch_size || '20' }}
            Glossary updated: see workflow log
            Vercel Deploy: triggered
