name: Daily SEO Agent Run

on:
  schedule:
    # 5:30 PM IST = 12:00 UTC daily (primary; backup handled by daily_scheduler_health.yml)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      disable_crawl:
        description: "Skip live site crawl"
        required: false
        default: false
        type: boolean
      run_growth_engine:
        description: "Also run the growth engine module"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
      - name: Check if a schedule run already happened today
        id: check
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ALREADY_RAN=$(gh run list --workflow "Daily SEO Agent Run" --event schedule --limit 5 --json conclusion,startedAt --jq "[.[] | select(.startedAt | startswith(\"${TODAY}\")) | select(.conclusion == \"success\")] | length")
          if [ "$ALREADY_RAN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Successful schedule run already found for $TODAY — main job will be skipped."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No successful schedule run yet for $TODAY — main job will proceed."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Default skip to false for non-schedule triggers
        if: github.event_name != 'schedule'
        run: echo "skip=false" >> "$GITHUB_OUTPUT"

  run-seo-growth:
    name: Run SEO Agent + Growth Engine
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: pipeleap-launchpad-publish
      cancel-in-progress: false
    env:
      DISABLE_CRAWL: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_crawl == true }}
      RUN_GROWTH_ENGINE: ${{ github.event_name != 'workflow_dispatch' || inputs.run_growth_engine == true }}
      LAUNCHPAD_DEPLOY_TOKEN: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout launchpad publish target
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          path: pipeleap-launchpad

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Write GSC credentials
        run: |
          mkdir -p credentials
          cat > credentials/gsc_service_account.json <<'EOF'
          ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Prepare artifact directories
        run: |
          mkdir -p outputs/post_publish
          python - <<'PY'
          from pathlib import Path
          Path("outputs/.heartbeat").write_text("seo-growth workflow started\n", encoding="utf-8")
          PY

      - name: Restore submitted URLs cache (cross-run dedup)
        uses: actions/cache@v5
        with:
          path: outputs/submitted_urls.json
          key: submitted-urls-${{ github.run_id }}
          restore-keys: submitted-urls-

      - name: Run SEO agent
        run: |
          ARGS=""
          if [ "$DISABLE_CRAWL" = "true" ]; then
            ARGS="--disable-crawl"
          fi
          python main.py $ARGS
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          MOZ_API_ACCESS_ID: ${{ secrets.MOZ_API_ACCESS_ID }}
          MOZ_API_SECRET_KEY: ${{ secrets.MOZ_API_SECRET_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}


      - name: Audit launchpad duplicates before commit
        run: |
          if [ -f pipeleap-launchpad/scripts/audit-duplicates.mjs ]; then
            cd pipeleap-launchpad && node scripts/audit-duplicates.mjs --fix
          else
            echo "No audit-duplicates script found, skipping."
          fi

      - name: Validate TypeScript compilation before commit
        run: |
          cd pipeleap-launchpad
          if ! npx tsc --noEmit 2>&1; then
            echo "TypeScript validation failed — aborting commit."
            exit 1
          fi

      - name: Commit and push generated launchpad content
        run: |
          cd pipeleap-launchpad
          git config user.name "Pipeleap SEO OS"
          git config user.email "manik.anakathala@gmail.com"

          PAGE_COUNT=$(find src/data/seo -name "metadata.json" 2>/dev/null | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          cat > src/data/_seo_run_meta.json <<JSON
          {
            "last_run": "${TIMESTAMP}",
            "run_number": "${{ github.run_number }}",
            "run_id": "${{ github.run_id }}",
            "triggered_by": "${{ github.event_name }}",
            "pages_total": ${PAGE_COUNT}
          }
          JSON

          git add -f src/data/_seo_run_meta.json public/sitemap*.xml public/robots.txt
          git add src/data/glossary-terms.ts 2>/dev/null || true
          git add src/data/blog-articles.ts 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No generated launchpad changes to commit."
          else
            git commit -m "SEO and growth agent run #${{ github.run_number }}"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin main; then
                exit 0
              fi
              git rebase --abort || true
              sleep $((attempt * 10))
            done
            echo "Unable to publish launchpad changes after 3 attempts." >&2
            exit 1
          fi

      - name: Verify indexing signals
        run: |
          python -u -c "
          import json, sys, yaml
          from pathlib import Path
          sys.path.insert(0, '.')
          config = yaml.safe_load(Path('config.yaml').read_text())
          from core.indexing_verifier import IndexingVerifier
          from connectors.gsc_connector import GoogleSearchConsoleConnector
          from connectors.indexnow_connector import IndexNowConnector
          gsc = GoogleSearchConsoleConnector(config, None)
          inow = IndexNowConnector()
          verifier = IndexingVerifier(config, gsc=gsc, indexnow=inow)
          # Load latest post_publish_signals.json from this run
          outputs_dir = Path('outputs')
          reports = sorted(outputs_dir.glob('*/post_publish_signals.json'))
          signals = {}
          if reports:
              signals = json.loads(reports[-1].read_text())
              print('Loaded post_publish_signals from:', reports[-1])
          result = verifier.verify_post_publish(
              post_publish_report=signals,
              new_urls=[],
              sitemap_path='pipeleap-launchpad/public/sitemap.xml',
              output_dir='outputs/indexing_verify',
          )
          print('Indexing verification:', json.dumps(result.get('channels', {}), indent=2))
          print(f'Overall OK: {result.get(\"overall_ok\")}')
          if not result.get('overall_ok'):
              print('WARNING: Some indexing signals failed verification')
          "

      - name: Upload run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: seo-growth-run-${{ github.run_number }}
          path: |
            outputs/
            !outputs/**/__pycache__/
          if-no-files-found: warn
          retention-days: 14

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "SEO Agent Run #${{ github.run_number }} — ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: SEO Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Daily SEO Agent run completed.

            Status: ${{ job.status }}
            Run: #${{ github.run_number }}
            Trigger: ${{ github.event_name }}
            Growth Engine: ${{ env.RUN_GROWTH_ENGINE }}
            Vercel Deploy: delegated to GEO Agent
