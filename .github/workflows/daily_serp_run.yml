name: Daily SERP Visibility Run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (write outputs, skip commit)"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Daily SEO Agent Run"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: serp-visibility-${{ github.ref }}
  cancel-in-progress: false

jobs:
  serp-visibility:
    name: SERP Visibility Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout launchpad (read-only reference)
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.GH_PAT }}
          path: pipeleap-launchpad

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GSC credentials
        run: |
          mkdir -p credentials
          cat > credentials/gsc_service_account.json <<'EOF'
          ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run SERP Visibility Agent
        env:
          MOZ_API_ACCESS_ID: ${{ secrets.MOZ_API_ACCESS_ID }}
          MOZ_API_SECRET_KEY: ${{ secrets.MOZ_API_SECRET_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python run_serp_visibility.py $DRY_RUN_FLAG

      - name: Commit and push outputs
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "pipeleap-seo-bot"
          git config user.email "bot@pipeleap.com"
          git add -f outputs/
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            git commit -m "chore: SERP visibility agent outputs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash origin master
              sleep $((attempt * 10))
            done
            echo "Unable to push SERP outputs after 3 attempts." >&2
            exit 1
          fi

      - name: Upload SERP visibility artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serp-visibility-${{ github.run_id }}
          path: outputs/
          retention-days: 14
