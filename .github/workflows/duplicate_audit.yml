name: Duplicate File Audit

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  audit-duplicates:
    name: Audit duplicate files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run duplicate audit
        run: python scripts/audit_duplicates.py
