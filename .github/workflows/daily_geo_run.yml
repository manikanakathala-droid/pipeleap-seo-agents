name: Daily GEO Agent Run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Analyze only; do not publish pages"
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows: ["Daily SEO Agent Run"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pipeleap-launchpad-publish
  cancel-in-progress: false

jobs:
  run-geo-agent:
    name: Run GEO Agent
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 30
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout launchpad publish target
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.LAUNCHPAD_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          path: pipeleap-launchpad

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Write GSC credentials
        run: |
          mkdir -p credentials
          cat > credentials/gsc_service_account.json <<'EOF'
          ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Prepare artifact directories
        run: |
          mkdir -p outputs/geo-agent outputs/post_publish
          python - <<'PY'
          from pathlib import Path
          Path("outputs/geo-agent/.heartbeat").write_text("geo workflow started\n", encoding="utf-8")
          PY

      - name: Run GEO agent
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="--dry-run"
          fi
          python run_geo_agent.py $ARGS
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}

      - name: Audit launchpad duplicates before commit
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          if [ -f pipeleap-launchpad/scripts/audit-duplicates.mjs ]; then
            cd pipeleap-launchpad && node scripts/audit-duplicates.mjs --fix
          else
            echo "No audit-duplicates script found, skipping."
          fi

      - name: Commit and push GEO content
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          cd pipeleap-launchpad
          git config user.name "Pipeleap SEO OS"
          git config user.email "manik.anakathala@gmail.com"

          PAGE_COUNT=$(find src/data/seo -name "metadata.json" 2>/dev/null | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          cat > src/data/_geo_run_meta.json <<JSON
          {
            "last_geo_run": "${TIMESTAMP}",
            "run_number": "${{ github.run_number }}",
            "geo_pages_in_index": ${PAGE_COUNT}
          }
          JSON

          git add -f src/data/_geo_run_meta.json
          if git diff --staged --quiet; then
            echo "No new GEO content to commit."
          else
            git commit -m "GEO agent run #${{ github.run_number }}"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin main; then
                exit 0
              fi
              git rebase --abort || true
              sleep $((attempt * 10))
            done
            echo "Unable to publish launchpad changes after 3 attempts." >&2
            exit 1
          fi

      - name: Upload GEO artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: geo-run-${{ github.run_number }}
          path: |
            outputs/
            !outputs/**/__pycache__/
          if-no-files-found: warn
          retention-days: 14

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "GEO Agent Run #${{ github.run_number }} — ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: SEO Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Daily GEO Agent run completed.

            Status: ${{ job.status }}
            Run: #${{ github.run_number }}
            Dry run: ${{ env.DRY_RUN }}
            Indexing signals: handled by GEO agent (auto-deduplicated)
