name: Daily SEO OS Run

on:
  workflow_dispatch:
    inputs:
      disable_crawl:
        description: "Skip live crawl (use synthetic snapshot)"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Daily SEO Agent Run"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: seo-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seo-os:
    name: "SEO OS - OBSERVE -> DIFF -> DECIDE -> EXECUTE -> LEARN"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout launchpad (read-only reference)
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.GH_PAT }}
          path: pipeleap-launchpad

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GSC credentials
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
        run: |
          mkdir -p credentials
          echo "$GSC_CREDENTIALS" > credentials/gsc_service_account.json

      - name: Restore SEO OS state cache
        uses: actions/cache@v5
        with:
          path: outputs/seo_os_state
          key: seo-os-cache-${{ github.run_id }}
          restore-keys: seo-os-cache-

      - name: Run SEO OS Agent
        env:
          MOZ_API_ACCESS_ID: ${{ secrets.MOZ_API_ACCESS_ID }}
          MOZ_API_SECRET_KEY: ${{ secrets.MOZ_API_SECRET_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          CRAWL_FLAG=""
          if [ "${{ github.event.inputs.disable_crawl }}" = "true" ]; then
            CRAWL_FLAG="--disable-crawl"
          fi
          python run_seo_os.py $CRAWL_FLAG

      - name: Commit repo outputs (structured + raw combined)
        run: |
          git config user.name  "Pipeleap SEO OS"
          git config user.email "manik.anakathala@gmail.com"
          git add seo/ content/ outputs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No repo changes to commit."
          else
            git commit -m "seo(os): run #${{ github.run_number }}"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash origin master
              sleep $((attempt * 10))
            done
            echo "Unable to push repo changes after 3 attempts." >&2
            exit 1
          fi

      - name: Commit generated content to launchpad
        run: |
          cd pipeleap-launchpad
          git config user.name  "Pipeleap SEO OS"
          git config user.email "manik.anakathala@gmail.com"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No launchpad content changes."
          else
            git commit -m "seo(os): generated content $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash origin main
              sleep $((attempt * 10))
            done
            echo "Unable to push launchpad content after 3 attempts." >&2
            exit 1
          fi

      - name: Refresh sitemap lastmod dates
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/regenerate_sitemap.py

      - name: Trigger Vercel deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Save SEO OS state cache
        uses: actions/cache@v5
        if: always()
        with:
          path: outputs/seo_os_state
          key: seo-os-cache-${{ github.run_id }}

      - name: Read daily briefing for email
        if: always()
        run: |
          FILE=$(ls outputs/*/daily_briefing.md 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            FILE="$FILE" python -u -c "
          import base64, os
          with open(os.environ['FILE']) as f:
              content = f.read(16000)
          encoded = base64.b64encode(content.encode()).decode('ascii')
          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write('BRIEFING_B64=' + encoded + chr(10))
          "
          else
            echo "BRIEFING_B64=" >> "$GITHUB_ENV"
          fi

      - name: Upload daily briefing
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: seo-os-briefing-${{ github.run_id }}
          path: |
            outputs/*/daily_briefing.md
            outputs/*/seo_os_report.json
          retention-days: 30

      - name: Send email notification
        if: always()
        run: |
          python -u -c "
          import base64, os, smtplib, ssl
          from email.mime.text import MIMEText

          body_b64 = os.environ.get('BRIEFING_B64', '')
          body = base64.b64decode(body_b64).decode() if body_b64 else 'No daily briefing file found.'
          body = body[:32000]

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = 'SEO OS Briefing #' + os.environ.get('GITHUB_RUN_NUMBER','?') + ' \u2014 ' + os.environ.get('JOB_STATUS','unknown')
          msg['From'] = 'SEO Bot <' + os.environ.get('MAIL_USERNAME','') + '>'
          msg['To'] = os.environ.get('MAIL_TO', '')

          ctx = ssl.create_default_context()
          with smtplib.SMTP(os.environ.get('MAIL_SERVER',''), int(os.environ.get('MAIL_PORT','587'))) as s:
              s.starttls(context=ctx)
              s.login(os.environ.get('MAIL_USERNAME',''), os.environ.get('MAIL_PASSWORD',''))
              s.send_message(msg)
          print('Email sent.')
          "
        env:
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          JOB_STATUS: ${{ job.status }}
        continue-on-error: true


