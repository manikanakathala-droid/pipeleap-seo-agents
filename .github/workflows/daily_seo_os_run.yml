name: Daily SEO OS Run

on:
  workflow_dispatch:
    inputs:
      disable_crawl:
        description: "Skip live crawl (use synthetic snapshot)"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Daily SEO Agent Run"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: seo-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seo-os:
    name: "SEO OS - OBSERVE -> DIFF -> DECIDE -> EXECUTE -> LEARN"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout launchpad (read-only reference)
        uses: actions/checkout@v6
        with:
          repository: manikanakathala-droid/pipeleap-launchpad-040053e5
          token: ${{ secrets.GH_PAT }}
          path: pipeleap-launchpad

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GSC credentials
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
        run: |
          mkdir -p credentials
          echo "$GSC_CREDENTIALS" > credentials/gsc_service_account.json

      - name: Restore SEO OS state cache
        uses: actions/cache@v4
        with:
          path: outputs/seo_os_state
          key: seo-os-cache-${{ github.run_id }}
          restore-keys: seo-os-cache-

      - name: Run SEO OS Agent
        env:
          MOZ_API_ACCESS_ID: ${{ secrets.MOZ_API_ACCESS_ID }}
          MOZ_API_SECRET_KEY: ${{ secrets.MOZ_API_SECRET_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          CRAWL_FLAG=""
          if [ "${{ github.event.inputs.disable_crawl }}" = "true" ]; then
            CRAWL_FLAG="--disable-crawl"
          fi
          python run_seo_os.py $CRAWL_FLAG

      - name: Commit structured SEO repo outputs
        run: |
          git config user.name  "pipeleap-seo-os"
          git config user.email "seo-os@pipeleap.com"
          git add seo/ content/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No structured SEO changes."
          else
            git commit -m "seo(os): structured outputs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash origin master
              sleep $((attempt * 10))
            done
            echo "Unable to push structured SEO changes after 3 attempts." >&2
            exit 1
          fi

      - name: Commit raw run outputs
        run: |
          git add -f outputs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No raw output changes."
          else
            git commit -m "chore(seo-os): raw outputs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash origin master
              sleep $((attempt * 10))
            done
            echo "Unable to push raw output changes after 3 attempts." >&2
            exit 1
          fi

      - name: Save SEO OS state cache
        uses: actions/cache@v4
        if: always()
        with:
          path: outputs/seo_os_state
          key: seo-os-cache-${{ github.run_id }}

      - name: Read daily briefing for email
        if: always()
        run: |
          FILE=$(ls outputs/*/daily_briefing.md 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            {
              echo 'BRIEFING<<EOF'
              head -n 200 "$FILE"
              echo 'EOF'
            } >> "$GITHUB_ENV"
          else
            echo "BRIEFING=No daily briefing file found." >> "$GITHUB_ENV"
          fi

      - name: Upload daily briefing
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: seo-os-briefing-${{ github.run_id }}
          path: |
            outputs/*/daily_briefing.md
            outputs/*/seo_os_report.json
          retention-days: 30

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "SEO OS Briefing #${{ github.run_number }} — ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: SEO Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ env.BRIEFING }}
        continue-on-error: true


